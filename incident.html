<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Incident technique — CareCare</title>
<style>
  html,body{height:100%;margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#F6EBDF;color:#003645;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:24px;box-sizing:border-box;
  }
  .card{max-width:480px}
  .icon{font-size:42px;line-height:1}
  h1{font-size:1.5rem;margin:20px 0 12px;font-weight:600;color:#003645}
  p{font-size:1rem;line-height:1.6;color:#003645;opacity:.75;margin:0}
  button{
    margin-top:28px;font:inherit;font-size:.95rem;color:#003645;background:transparent;
    border:1.5px solid #003645;border-radius:8px;padding:10px 22px;cursor:pointer;
    transition:background .15s,color .15s;
  }
  button:hover{background:#003645;color:#F6EBDF}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">⚠️</div>
    <h1>Une erreur est survenue</h1>
    <p>Un incident technique empêche momentanément l'accès au service.
       Nos équipes sont mobilisées&nbsp;; merci de réessayer dans quelques instants.</p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
