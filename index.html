<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="20">
<title>Maintenance en cours — CareCare</title>
<style>
  html,body{height:100%;margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#F6EBDF;color:#003645;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:24px;box-sizing:border-box;
  }
  .card{max-width:480px}
  .dot{
    width:14px;height:14px;border-radius:50%;background:#003645;display:inline-block;
    margin:0 4px;animation:b 1.2s infinite ease-in-out both;
  }
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes b{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
  h1{font-size:1.5rem;margin:24px 0 12px;font-weight:600;color:#003645}
  p{font-size:1rem;line-height:1.6;color:#003645;opacity:.75;margin:0}
  button{
    margin-top:28px;font:inherit;font-size:.95rem;color:#003645;background:transparent;
    border:1.5px solid #003645;border-radius:8px;padding:10px 22px;cursor:pointer;
    transition:background .15s,color .15s;
  }
  button:hover{background:#003645;color:#F6EBDF}
</style>
</head>
<body>
  <div class="card">
    <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <h1>Mise à jour en cours</h1>
    <p>CareCare est momentanément indisponible le temps d'une mise à jour technique.
       Cette page se rafraîchit automatiquement&nbsp;; le service revient dans quelques minutes.</p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
