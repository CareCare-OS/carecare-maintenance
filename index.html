<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maintenance en cours — CareCare</title>
<style>
  html,body{height:100%;margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:24px;box-sizing:border-box;
  }
  .card{max-width:480px}
  .dot{
    width:14px;height:14px;border-radius:50%;background:#38bdf8;display:inline-block;
    margin:0 4px;animation:b 1.2s infinite ease-in-out both;
  }
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes b{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
  h1{font-size:1.5rem;margin:24px 0 12px;font-weight:600}
  p{font-size:1rem;line-height:1.6;color:#94a3b8;margin:0}
</style>
</head>
<body>
  <div class="card">
    <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <h1>Mise à jour en cours</h1>
    <p>CareCare est momentanément indisponible le temps d'une mise à jour technique.
       Le service revient dans quelques minutes — merci de votre patience.</p>
  </div>
</body>
</html>
